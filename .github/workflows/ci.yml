name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate frontmatter
        run: npm run validate

      - name: Test
        run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Package MinSpec
        run: npm run package --workspace=packages/minspec

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-packages
          path: packages/minspec/*.vsix
          if-no-files-found: ignore
